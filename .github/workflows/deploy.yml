name: "EC2 Deploy (Docker Compose: Orchestrator -> Pipeline)"

on:
  push:
    branches: ["main"]

  workflow_dispatch:
    inputs:
      slot:
        description: "Slot name or slot number (example: 2 or slot 2)"
        required: false
        default: ""
        type: string
      timezone:
        description: "Timezone for till command"
        required: false
        default: "America/New_York"
        type: string
      clean_first:
        description: "Delete old outputs before pipeline"
        required: false
        default: "true"
        type: string
      trigger_source:
        description: "Source of trigger"
        required: false
        default: "manual"
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: ec2-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -------------------------
      # Build + Push WORKER image
      # -------------------------
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push worker image to ECR
        id: ecr
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REPO: ${{ secrets.WORKER_ECR_REPO }}
        run: |
          set -euo pipefail

          if [ -z "${ECR_REPO}" ]; then
            echo "ERROR: WORKER_ECR_REPO secret is empty"
            exit 1
          fi

          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"

          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

          echo "Pushing to: ${IMAGE_URI}"

          aws ecr describe-repositories --region "${AWS_REGION}" --repository-names "${ECR_REPO}" >/dev/null 2>&1 || \
            aws ecr create-repository --region "${AWS_REGION}" --repository-name "${ECR_REPO}" >/dev/null

          docker build -f Dockerfile.worker -t "${IMAGE_URI}:latest" .
          docker tag "${IMAGE_URI}:latest" "${IMAGE_URI}:${GITHUB_SHA}"

          docker push "${IMAGE_URI}:latest"
          docker push "${IMAGE_URI}:${GITHUB_SHA}"

      # -------------------------
      # Ensure main EC2 is running
      # -------------------------
      - name: Ensure main EC2 is running
        shell: bash
        run: |
          set -euo pipefail
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"

          STATE="$(aws ec2 describe-instances --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].State.Name' --output text)"

          echo "Current state: $STATE"

          if [ "$STATE" = "stopping" ]; then
            echo "Instance is stopping. Waiting for stopped..."
            aws ec2 wait instance-stopped --instance-ids "$INSTANCE_ID"
            STATE="stopped"
          fi

          if [ "$STATE" = "pending" ]; then
            echo "Instance is pending. Waiting for running..."
            aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
          elif [ "$STATE" = "running" ]; then
            echo "Instance already running."
          elif [ "$STATE" = "stopped" ]; then
            echo "Starting instance..."
            aws ec2 start-instances --instance-ids "$INSTANCE_ID" >/dev/null
            aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
          else
            echo "ERROR: Unexpected instance state: $STATE"
            exit 1
          fi

      - name: Wait for EC2 status checks OK
        shell: bash
        run: |
          set -euo pipefail
          aws ec2 wait instance-status-ok --instance-ids "${{ secrets.EC2_INSTANCE_ID }}"
          echo "Instance status checks OK."

      - name: Get EC2 public IP
        id: ec2ip
        shell: bash
        run: |
          set -euo pipefail
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          IP="$(aws ec2 describe-instances --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)"

          if [ "$IP" = "None" ] || [ -z "$IP" ]; then
            echo "ERROR: No public IP on instance."
            exit 1
          fi

          echo "public_ip=$IP" >> "$GITHUB_OUTPUT"
          echo "EC2 Public IP: $IP"

      - name: Wait for SSH
        shell: bash
        run: |
          set -euo pipefail
          HOST="${{ steps.ec2ip.outputs.public_ip }}"
          echo "Waiting for SSH on $HOST:22 ..."
          for i in {1..120}; do
            if nc -z -w 5 "$HOST" 22; then
              echo "SSH reachable."
              exit 0
            fi
            sleep 5
          done
          echo "ERROR: SSH not reachable."
          exit 1

      # -------------------------
      # Resolve workflow inputs
      # -------------------------
      - name: Resolve workflow inputs
        id: wfinputs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_SLOT="${{ github.event.inputs.slot }}"
            TIMEZONE_INPUT="${{ github.event.inputs.timezone }}"
            CLEAN_FIRST_INPUT="${{ github.event.inputs.clean_first }}"
            TRIGGER_SOURCE_INPUT="${{ github.event.inputs.trigger_source }}"
          else
            RAW_SLOT=""
            TIMEZONE_INPUT="America/New_York"
            CLEAN_FIRST_INPUT="false"
            TRIGGER_SOURCE_INPUT="push"
          fi

          SLOT_CHOICE="$(printf '%s' "$RAW_SLOT" | grep -oE '[0-9]+' | head -n1 || true)"

          echo "slot_choice=${SLOT_CHOICE}" >> "$GITHUB_OUTPUT"
          echo "timezone_input=${TIMEZONE_INPUT}" >> "$GITHUB_OUTPUT"
          echo "clean_first_input=${CLEAN_FIRST_INPUT}" >> "$GITHUB_OUTPUT"
          echo "trigger_source_input=${TRIGGER_SOURCE_INPUT}" >> "$GITHUB_OUTPUT"

          echo "Resolved inputs:"
          echo "  raw_slot=${RAW_SLOT}"
          echo "  slot_choice=${SLOT_CHOICE}"
          echo "  timezone=${TIMEZONE_INPUT}"
          echo "  clean_first=${CLEAN_FIRST_INPUT}"
          echo "  trigger_source=${TRIGGER_SOURCE_INPUT}"

      # -------------------------
      # Deploy + start run_detached.sh
      # -------------------------
      - name: Deploy + run pipeline on main EC2 (run_detached.sh)
        uses: appleboy/ssh-action@v1.0.3
        env:
          EC2_PATH: ${{ secrets.EC2_PATH }}
          WORKER_IMAGE_TAG: ${{ steps.ecr.outputs.tag }}
          WORKER_ECR_REPO: ${{ secrets.WORKER_ECR_REPO }}
          STOP_ON_FAILURE: "1"
          SLOT_CHOICE: ${{ steps.wfinputs.outputs.slot_choice }}
          TIMEZONE_INPUT: ${{ steps.wfinputs.outputs.timezone_input }}
          CLEAN_FIRST: ${{ steps.wfinputs.outputs.clean_first_input }}
          TRIGGER_SOURCE: ${{ steps.wfinputs.outputs.trigger_source_input }}
        with:
          host: ${{ steps.ec2ip.outputs.public_ip }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 60m
          envs: EC2_PATH,WORKER_IMAGE_TAG,WORKER_ECR_REPO,STOP_ON_FAILURE,SLOT_CHOICE,TIMEZONE_INPUT,CLEAN_FIRST,TRIGGER_SOURCE
          script: |
            set -euo pipefail
            cd "$EC2_PATH"

            echo "== Update code =="
            git fetch --all
            git reset --hard origin/main
            git clean -fd || true

            echo "== Ensure docker running =="
            sudo systemctl enable docker || true
            sudo systemctl start docker || true

            echo "== Pre-clean docker state on server =="
            docker compose down --volumes --rmi all --remove-orphans || true
            docker system prune -a --volumes -f || true

            echo "== Update worker image settings in .env =="
            if grep -q "^WORKER_ECR_REPO=" .env; then
              sed -i "s|^WORKER_ECR_REPO=.*|WORKER_ECR_REPO=${WORKER_ECR_REPO}|" .env
            else
              echo "WORKER_ECR_REPO=${WORKER_ECR_REPO}" >> .env
            fi

            if grep -q "^WORKER_IMAGE_TAG=" .env; then
              sed -i "s|^WORKER_IMAGE_TAG=.*|WORKER_IMAGE_TAG=${WORKER_IMAGE_TAG}|" .env
            else
              echo "WORKER_IMAGE_TAG=${WORKER_IMAGE_TAG}" >> .env
            fi

            echo "== Update pipeline trigger settings in .env =="
            if grep -q "^SLOT_CHOICE=" .env; then
              sed -i "s|^SLOT_CHOICE=.*|SLOT_CHOICE=${SLOT_CHOICE}|" .env
            else
              echo "SLOT_CHOICE=${SLOT_CHOICE}" >> .env
            fi

            if grep -q "^TIMEZONE_INPUT=" .env; then
              sed -i "s|^TIMEZONE_INPUT=.*|TIMEZONE_INPUT=${TIMEZONE_INPUT}|" .env
            else
              echo "TIMEZONE_INPUT=${TIMEZONE_INPUT}" >> .env
            fi

            if grep -q "^CLEAN_FIRST=" .env; then
              sed -i "s|^CLEAN_FIRST=.*|CLEAN_FIRST=${CLEAN_FIRST}|" .env
            else
              echo "CLEAN_FIRST=${CLEAN_FIRST}" >> .env
            fi

            if grep -q "^TRIGGER_SOURCE=" .env; then
              sed -i "s|^TRIGGER_SOURCE=.*|TRIGGER_SOURCE=${TRIGGER_SOURCE}|" .env
            else
              echo "TRIGGER_SOURCE=${TRIGGER_SOURCE}" >> .env
            fi

            echo "== Run detached pipeline =="
            echo "STOP_ON_FAILURE=${STOP_ON_FAILURE}"
            echo "SLOT_CHOICE=${SLOT_CHOICE}"
            echo "TIMEZONE_INPUT=${TIMEZONE_INPUT}"
            echo "CLEAN_FIRST=${CLEAN_FIRST}"
            echo "TRIGGER_SOURCE=${TRIGGER_SOURCE}"

            chmod +x run_detached.sh
            STOP_ON_FAILURE="${STOP_ON_FAILURE}" \
            SLOT_CHOICE="${SLOT_CHOICE}" \
            TIMEZONE_INPUT="${TIMEZONE_INPUT}" \
            CLEAN_FIRST="${CLEAN_FIRST}" \
            TRIGGER_SOURCE="${TRIGGER_SOURCE}" \
            EC2_PATH="${EC2_PATH}" \
            ./run_detached.sh

            echo "== run_detached.sh started. Pipeline continues in background on EC2. =="
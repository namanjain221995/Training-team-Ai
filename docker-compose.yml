services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    image: test_runner-image:latest
    container_name: orchestrator
    env_file: [.env]
    environment:
      - AWS_REGION=${AWS_REGION}
      - AWS_DEFAULT_REGION=${AWS_REGION}
      - AWS_EC2_METADATA_DISABLED=false

      - WORKER_LAUNCH_TEMPLATE_ID=${WORKER_LAUNCH_TEMPLATE_ID}
      - WORKER_LAUNCH_TEMPLATE_VERSION=${WORKER_LAUNCH_TEMPLATE_VERSION}

      - WORKER_LOG_GROUP=/transcription/workers
      - SLOT_CHOICE=${SLOT_CHOICE}
      - ROOT_2026_FOLDER_NAME=${ROOT_2026_FOLDER_NAME:-2026}
      - USE_SHARED_DRIVES=${USE_SHARED_DRIVES:-0}

      - TOKEN_FILE=/app/token.json
      - TOKEN_FILE_WRITE=/app/state/token_refreshed.json

      # Optional: control Drive retries
      - GOOGLE_EXECUTE_RETRIES=${GOOGLE_EXECUTE_RETRIES:-8}
      - GOOGLE_PAGE_SIZE=${GOOGLE_PAGE_SIZE:-500}

      # Worker termination behavior (recommended)
      - USE_SHUTDOWN_TERMINATE=${USE_SHUTDOWN_TERMINATE:-1}

      # Optional: SSM param names (worker reads)
      - SSM_ENV_PARAM=${SSM_ENV_PARAM:-/transcription/worker/env}
      - SSM_CREDENTIALS_PARAM=${SSM_CREDENTIALS_PARAM:-/transcription/worker/credentials_json}
      - SSM_TOKEN_PARAM=${SSM_TOKEN_PARAM:-/transcription/worker/token_json}

    volumes:
      - ./:/app
      - ./token.json:/app/token.json:ro
      - ./credentials.json:/app/credentials.json:ro
      - gdrive_state:/app/state

    command: ["python", "main_ec2_pipeline.py"]

  pipeline_rest:
    image: test_runner-image:latest
    container_name: pipeline_rest
    env_file: [.env]
    environment:
      - AWS_REGION=${AWS_REGION}
      - AWS_DEFAULT_REGION=${AWS_REGION}
      - AWS_EC2_METADATA_DISABLED=false

      - TOKEN_FILE=/app/token.json
      - CREDENTIALS_FILE=/app/credentials.json
      - HEADLESS_AUTH=1
      - XDG_CACHE_HOME=/app/cache

      - HF_TOKEN=${HF_TOKEN}
      - HUGGINGFACE_HUB_TOKEN=${HF_TOKEN}

    volumes:
      - ./:/app
      - ./token.json:/app/token.json:ro
      - ./credentials.json:/app/credentials.json:ro
      - whisper_cache:/app/cache

    depends_on:
      orchestrator:
        condition: service_completed_successfully

    command: >
      sh -c "set -e;
        python script.py &&
        python test3.py &&
        python llm.py &&
        python each-personscore-docs.py &&
        python docs.py &&
        python sheet.py
      "

  log_viewer:
    image: test_runner-image:latest
    container_name: worker_log_viewer
    env_file: [.env]
    environment:
      - AWS_REGION=${AWS_REGION}
      - AWS_DEFAULT_REGION=${AWS_REGION}
      - AWS_EC2_METADATA_DISABLED=false
      - WORKER_LOG_GROUP=/transcription/workers
    volumes:
      - ./:/app
    entrypoint: ["bash", "-lc", "sleep infinity"]

volumes:
  whisper_cache:
  gdrive_state:
services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    image: test_runner-image:latest
    container_name: orchestrator
    env_file: [.env]
    environment:
      - AWS_REGION=${AWS_REGION}
      - AWS_DEFAULT_REGION=${AWS_REGION}
      - AWS_EC2_METADATA_DISABLED=false

      - WORKER_LAUNCH_TEMPLATE_ID=${WORKER_LAUNCH_TEMPLATE_ID}
      - WORKER_LAUNCH_TEMPLATE_VERSION=${WORKER_LAUNCH_TEMPLATE_VERSION}

      - WORKER_LOG_GROUP=/transcription/workers

      - SLOT_CHOICE=${SLOT_CHOICE}
      - TIMEZONE_INPUT=${TIMEZONE_INPUT:-America/New_York}
      - CLEAN_FIRST=${CLEAN_FIRST:-false}
      - TRIGGER_SOURCE=${TRIGGER_SOURCE:-manual}

      - ROOT_2026_FOLDER_NAME=${ROOT_2026_FOLDER_NAME:-2026}
      - USE_SHARED_DRIVES=${USE_SHARED_DRIVES:-0}

      - TOKEN_FILE=/app/token.json
      - TOKEN_FILE_WRITE=/app/state/token_refreshed.json

      - GOOGLE_EXECUTE_RETRIES=${GOOGLE_EXECUTE_RETRIES:-8}
      - GOOGLE_PAGE_SIZE=${GOOGLE_PAGE_SIZE:-500}

      - USE_SHUTDOWN_TERMINATE=${USE_SHUTDOWN_TERMINATE:-1}

      - SSM_ENV_PARAM=${SSM_ENV_PARAM:-/transcription/worker/env}
      - SSM_CREDENTIALS_PARAM=${SSM_CREDENTIALS_PARAM:-/transcription/worker/credentials_json}
      - SSM_TOKEN_PARAM=${SSM_TOKEN_PARAM:-/transcription/worker/token_json}

      - WORKER_ECR_REPO=${WORKER_ECR_REPO:-transcription-worker}
      - WORKER_IMAGE_TAG=${WORKER_IMAGE_TAG:-latest}

      - WORKER_WHISPER_MODEL=${WORKER_WHISPER_MODEL:-large-v3}
      - WORKER_DEVICE=${WORKER_DEVICE:-cpu}
      - WORKER_COMPUTE_TYPE=${WORKER_COMPUTE_TYPE:-int8}
      - WORKER_LANGUAGE=${WORKER_LANGUAGE:-en}
      - WORKER_USE_VAD=${WORKER_USE_VAD:-true}
      - WORKER_CHUNK_SECONDS=${WORKER_CHUNK_SECONDS:-540}
      - WORKER_OVERLAP_SECONDS=${WORKER_OVERLAP_SECONDS:-2}

      - MAX_CONCURRENT_WORKERS=${MAX_CONCURRENT_WORKERS:-14}
      - VIDEOS_PER_WORKER=${VIDEOS_PER_WORKER:-20}

    volumes:
      - ./:/app
      - ./token.json:/app/token.json:ro
      - ./credentials.json:/app/credentials.json:ro
      - gdrive_state:/app/state

    command: ["python", "main_ec2_pipeline.py"]

  pipeline_rest:
    image: test_runner-image:latest
    container_name: pipeline_rest
    env_file: [.env]
    environment:
      - AWS_REGION=${AWS_REGION}
      - AWS_DEFAULT_REGION=${AWS_REGION}
      - AWS_EC2_METADATA_DISABLED=false

      - SLOT_CHOICE=${SLOT_CHOICE}
      - TIMEZONE_INPUT=${TIMEZONE_INPUT:-America/New_York}
      - CLEAN_FIRST=${CLEAN_FIRST:-false}
      - TRIGGER_SOURCE=${TRIGGER_SOURCE:-manual}

      - TOKEN_FILE=/app/token.json
      - CREDENTIALS_FILE=/app/credentials.json
      - HEADLESS_AUTH=1
      - XDG_CACHE_HOME=/app/cache

      - HF_TOKEN=${HF_TOKEN}
      - HUGGINGFACE_HUB_TOKEN=${HF_TOKEN}

    volumes:
      - ./:/app
      - ./token.json:/app/token.json:ro
      - ./credentials.json:/app/credentials.json:ro
      - whisper_cache:/app/cache

    depends_on:
      orchestrator:
        condition: service_completed_successfully

    command: >
      sh -c "set -e;
        echo '[INFO] pipeline_rest starting';
        echo '[INFO] SLOT_CHOICE='\"$$SLOT_CHOICE\";
        echo '[INFO] TIMEZONE_INPUT='\"$$TIMEZONE_INPUT\";
        echo '[INFO] CLEAN_FIRST='\"$$CLEAN_FIRST\";
        echo '[INFO] TRIGGER_SOURCE='\"$$TRIGGER_SOURCE\";

        python script.py;
        python llm.py;
        python each-personscore-docs.py;
        python docs.py;
        python sheet.py;
        python final-mail.py;
      "

  log_viewer:
    image: test_runner-image:latest
    container_name: worker_log_viewer
    env_file: [.env]
    environment:
      - AWS_REGION=${AWS_REGION}
      - AWS_DEFAULT_REGION=${AWS_REGION}
      - AWS_EC2_METADATA_DISABLED=false
      - WORKER_LOG_GROUP=/transcription/workers

      - SLOT_CHOICE=${SLOT_CHOICE}
      - TIMEZONE_INPUT=${TIMEZONE_INPUT:-America/New_York}
      - CLEAN_FIRST=${CLEAN_FIRST:-false}
      - TRIGGER_SOURCE=${TRIGGER_SOURCE:-manual}

    volumes:
      - ./:/app
    entrypoint: ["bash", "-lc", "sleep infinity"]

volumes:
  whisper_cache:
  gdrive_state: